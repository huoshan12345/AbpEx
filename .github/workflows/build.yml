name: Build
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build.yml
      - '*.sln'
      - '*.slnx'
      - build/pack.ps1
      - build/pkg.version
      - NuGet.Config
      - src/**
      - test/**
  pull_request_target: # use pull_request_target instead of pull_request to let dependabot have permission to access action secrets.
    branches:
      - main

permissions:
  pull-requests: write
  contents: write
  statuses: write
  checks: write
  actions: write

env:
  SOLUTION: AbpEx.slnx
  DOTNET_NOLOGO: 1
  MYGET_APIKEY: ${{ secrets.MYGET_APIKEY }}
  NUGET_APIKEY: ${{ secrets.NUGET_APIKEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Get PR
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: suzuki-shunsuke/get-pr-action@v0.1.0
        id: pr

      - name: Print variables
        shell: pwsh
        run: |
          echo "merge_commit_sha: ${{ steps.pr.outputs.merge_commit_sha }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.merge_commit_sha }}

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: NuGet Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Test Release
        timeout-minutes: 10
        run: dotnet test ${{ env.SOLUTION }} --no-restore -c Release

      - name: Test Report
        uses: dorny/test-reporter@main
        if: (success() || failure())
        with:
          name: Test Report
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          list-suites: failed
          list-tests: failed

  build-win:
    runs-on: windows-latest
    env:
      DOTNET_INSTALL_DIR: D:\tools\dotnet
      NUGET_PACKAGES: D:\.nuget\packages
      COMPlus_ReadyToRun: 0
      COMPlus_ZapDisable: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Check missing SDKs
        id: sdk_check
        shell: pwsh
        run: |
          $wanted = @(
            '8.0.x'
            '9.0.x'
            '10.0.x'
          )

          $installed = dotnet --list-sdks

          $missing = foreach ($sdk in $wanted) {
            $prefix = $sdk -replace 'x$', ''
            if (-not ($installed -match "^$([regex]::Escape($prefix))")) {
              $sdk
            }
          }

          $joined = $missing -join "`n"

          "missing<<EOF" >> $env:GITHUB_OUTPUT
          $joined >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

          Write-Host "Missing SDKs: $joined"

      - name: Setup missing SDKs
        if: steps.sdk_check.outputs.missing != ''
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ steps.sdk_check.outputs.missing }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }} -v q

      - name: Test Release
        timeout-minutes: 10
        run: dotnet test ${{ env.SOLUTION }} -c Release --no-restore

      - name: Test Release nfx-x64
        timeout-minutes: 10
        run: dotnet test ${{ env.SOLUTION }} -c Release -f net472 --arch x64

      - name: Test Report
        uses: dorny/test-reporter@main
        if: (success() || failure())
        with:
          name: Test Report
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          list-suites: failed
          list-tests: failed

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build
      - build-win
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: NuGet Publish
        shell: pwsh
        run: |
          ./build/pack.ps1

      - name: Set variables
        shell: pwsh
        run: |
          $ver = Get-Content -Path ./build/pkg.version
          echo "VERSION=$ver" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf-8 -Append
          echo $ver

      - name: Create Tag
        uses: huoshan12345/update-tag@v1
        with:
          tag_name: ${{ env.VERSION }}
          update_if_exists: false
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.VERSION }}
          token: ${{ secrets.PAT }}
          generateReleaseNotes: true
          skipIfReleaseExists: true
...
